<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>404 — Page not found · Sachin S</title>
    <style>
      :root { --paper:#f4f3ee; --ink:#100f0d; --muted:#6d6b62; --accent:#c2410c; --grid:#dcdad0; }
      * { box-sizing:border-box; margin:0; }
      body {
        min-height:100vh; display:grid; place-items:center; padding:2rem;
        background:var(--paper); color:var(--ink);
        font-family:'Inter',system-ui,-apple-system,sans-serif;
        background-image:
          linear-gradient(to right, var(--grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid) 1px, transparent 1px);
        background-size:24px 24px;
      }
      .wrap { text-align:center; max-width:32rem; }
      .code {
        font-family:ui-monospace,'JetBrains Mono',Consolas,monospace;
        font-size:.8rem; letter-spacing:.28em; text-transform:uppercase;
        color:var(--accent); margin-bottom:1rem;
      }
      h1 { font-size:clamp(2.5rem,9vw,4.5rem); letter-spacing:-.035em; line-height:1; margin-bottom:1rem; }
      p { color:var(--muted); margin-bottom:2rem; }
      a {
        display:inline-flex; align-items:center; gap:.5rem;
        padding:.9rem 1.5rem; border-radius:6px;
        background:var(--ink); color:var(--paper); text-decoration:none;
        font-family:ui-monospace,'JetBrains Mono',Consolas,monospace;
        font-size:.8rem; letter-spacing:.04em; text-transform:uppercase; font-weight:600;
        transition:transform .2s, box-shadow .2s;
      }
      a:hover { transform:translateY(-2px); box-shadow:4px 4px 0 var(--accent); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p class="code">Error 404</p>
      <h1>Page not found.</h1>
      <p>That page doesn’t exist — but the rest of the portfolio does.</p>
      <a href="/My-Portifolio/">← Back to home</a>
    </div>
  </body>
</html>
